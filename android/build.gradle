buildscript {
    repositories {
        maven { url 'https://maven.myket.ir' }
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.8.2'
        classpath 'com.google.gms:google-services:4.4.4'
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        maven { url 'https://maven.myket.ir' }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}